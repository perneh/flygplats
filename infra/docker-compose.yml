# Run from repository root: docker compose -f infra/docker-compose.yml up --build
# Or: cd infra && docker compose up --build

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: golf
      POSTGRES_PASSWORD: golf
      POSTGRES_DB: golf
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U golf -d golf"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://golf:golf@db:5432/golf
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.frontend
    environment:
      API_BASE_URL: http://backend:8000
      # FRONTEND_DISPLAY in .env overrides (see .env.example). Fallback: host DISPLAY, then Docker Desktop host.
      # Linux GUI: use -f infra/docker-compose.linux-x11.yml and set FRONTEND_DISPLAY=:0 (or export DISPLAY=:0).
      DISPLAY: ${FRONTEND_DISPLAY:-${DISPLAY:-host.docker.internal:0}}
      # Avoid MIT-SHM over TCP/Docker; fixes many "could not connect to display" / blank window cases.
      QT_X11_NO_MITSHM: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend

  test-runner:
    build:
      context: ..
      dockerfile: infra/Dockerfile.test-runner
    profiles:
      - tests
    environment:
      QT_QPA_PLATFORM: offscreen

volumes:
  pgdata:
