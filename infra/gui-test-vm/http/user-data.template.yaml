#cloud-config
hostname: golf-gui-vm
fqdn: golf-gui-vm.local

users:
  - name: debian
    groups: [adm, sudo]
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    ssh_authorized_keys:
      - __BUILDER_PUB__

# Console / LightDM password for user debian (lab). Substituted at image build time.
chpasswd:
  list: |
    debian:__VM_CONSOLE_PASSWORD__
  expire: false

ssh_pwauth: false

package_update: true
packages:
  - curl
  - ca-certificates
