#cloud-config
hostname: golf-gui-vm
fqdn: golf-gui-vm.local

users:
  # Packer / automation SSH (unchanged — packer.pkr.hcl uses ssh_username debian).
  - name: debian
    groups: [adm, sudo]
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    ssh_authorized_keys:
      - __BUILDER_PUB__
  # Graphical desktop login (LightDM autologin targets this user in setup.sh).
  - name: admin
    groups: [adm, sudo]
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    ssh_authorized_keys:
      - __BUILDER_PUB__

# Console / LightDM password for user admin (lab). Substituted at image build time.
chpasswd:
  list: |
    admin:__VM_CONSOLE_PASSWORD__
  expire: false

ssh_pwauth: false

package_update: true
packages:
  - curl
  - ca-certificates
